services:
  postgres:
    image: postgres:16-alpine
    container_name: daubert-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: daubert
      POSTGRES_PASSWORD: daubert
      POSTGRES_DB: daubert
    volumes:
      - daubert_pgdata:/var/lib/postgresql/data

volumes:
  daubert_pgdata:
