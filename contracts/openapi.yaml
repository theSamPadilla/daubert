openapi: 3.0.3
info:
  title: Daubert API
  version: 0.1.0
  description: Blockchain investigation tool API

servers:
  - url: http://localhost:8081

paths:
  /cases:
    $ref: './paths/cases.yaml#/~1cases'
  /cases/{id}:
    $ref: './paths/cases.yaml#/~1cases~1{id}'
  /cases/{caseId}/investigations:
    $ref: './paths/investigations.yaml#/~1cases~1{caseId}~1investigations'
  /investigations/{id}:
    $ref: './paths/investigations.yaml#/~1investigations~1{id}'
  /investigations/{investigationId}/traces:
    $ref: './paths/traces.yaml#/~1investigations~1{investigationId}~1traces'
  /traces/{id}:
    $ref: './paths/traces.yaml#/~1traces~1{id}'
  /blockchain/fetch-history:
    $ref: './paths/blockchain.yaml#/~1blockchain~1fetch-history'
  /cases/{caseId}/conversations:
    $ref: './paths/ai.yaml#/~1cases~1{caseId}~1conversations'
  /conversations/{id}/messages:
    $ref: './paths/ai.yaml#/~1conversations~1{id}~1messages'
  /conversations/{id}/chat:
    $ref: './paths/ai.yaml#/~1conversations~1{id}~1chat'
  /labeled-entities:
    $ref: './paths/labeled-entities.yaml#/~1labeled-entities'
  /labeled-entities/lookup:
    $ref: './paths/labeled-entities.yaml#/~1labeled-entities~1lookup'
  /labeled-entities/{id}:
    $ref: './paths/labeled-entities.yaml#/~1labeled-entities~1{id}'
  /cases/{caseId}/productions:
    $ref: './paths/productions.yaml#/~1cases~1{caseId}~1productions'
  /productions/{id}:
    $ref: './paths/productions.yaml#/~1productions~1{id}'
  /admin/users:
    $ref: './paths/admin-users.yaml#/~1admin~1users'
  /admin/users/{id}:
    $ref: './paths/admin-users.yaml#/~1admin~1users~1{id}'
  /admin/cases:
    $ref: './paths/admin-cases.yaml#/~1admin~1cases'
  /admin/cases/{id}:
    $ref: './paths/admin-cases.yaml#/~1admin~1cases~1{id}'
  /admin/cases/{id}/members:
    $ref: './paths/admin-cases.yaml#/~1admin~1cases~1{id}~1members'
  /admin/cases/{id}/members/{userId}:
    $ref: './paths/admin-cases.yaml#/~1admin~1cases~1{id}~1members~1{userId}'
  /admin/labeled-entities:
    $ref: './paths/admin-labeled-entities.yaml#/~1admin~1labeled-entities'
  /admin/labeled-entities/{id}:
    $ref: './paths/admin-labeled-entities.yaml#/~1admin~1labeled-entities~1{id}'
  /exports/productions/{id}:
    $ref: './paths/export.yaml#/~1exports~1productions~1{id}'
  /exports/graph:
    $ref: './paths/export.yaml#/~1exports~1graph'

components:
  schemas:
    ErrorResponse:
      $ref: './schemas/common.yaml#/ErrorResponse'
    Case:
      $ref: './schemas/cases.yaml#/Case'
    CreateCaseRequest:
      $ref: './schemas/cases.yaml#/CreateCaseRequest'
    UpdateCaseRequest:
      $ref: './schemas/cases.yaml#/UpdateCaseRequest'
    Investigation:
      $ref: './schemas/investigations.yaml#/Investigation'
    CreateInvestigationRequest:
      $ref: './schemas/investigations.yaml#/CreateInvestigationRequest'
    UpdateInvestigationRequest:
      $ref: './schemas/investigations.yaml#/UpdateInvestigationRequest'
    Trace:
      $ref: './schemas/traces.yaml#/Trace'
    CreateTraceRequest:
      $ref: './schemas/traces.yaml#/CreateTraceRequest'
    UpdateTraceRequest:
      $ref: './schemas/traces.yaml#/UpdateTraceRequest'
    FetchHistoryRequest:
      $ref: './schemas/blockchain.yaml#/FetchHistoryRequest'
    FetchHistoryResponse:
      $ref: './schemas/blockchain.yaml#/FetchHistoryResponse'
    Conversation:
      $ref: './schemas/ai.yaml#/Conversation'
    Message:
      $ref: './schemas/ai.yaml#/Message'
    ChatRequest:
      $ref: './schemas/ai.yaml#/ChatRequest'
    ChatSseEvent:
      $ref: './schemas/ai.yaml#/ChatSseEvent'
    EntityCategory:
      $ref: './schemas/labeled-entities.yaml#/EntityCategory'
    LabeledEntity:
      $ref: './schemas/labeled-entities.yaml#/LabeledEntity'
    CreateLabeledEntityRequest:
      $ref: './schemas/labeled-entities.yaml#/CreateLabeledEntityRequest'
    UpdateLabeledEntityRequest:
      $ref: './schemas/labeled-entities.yaml#/UpdateLabeledEntityRequest'
    ProductionType:
      $ref: './schemas/productions.yaml#/ProductionType'
    Production:
      $ref: './schemas/productions.yaml#/Production'
    CreateProductionRequest:
      $ref: './schemas/productions.yaml#/CreateProductionRequest'
    UpdateProductionRequest:
      $ref: './schemas/productions.yaml#/UpdateProductionRequest'
    CaseRole:
      $ref: './schemas/admin.yaml#/CaseRole'
    AdminUser:
      $ref: './schemas/admin.yaml#/AdminUser'
    CreateUserRequest:
      $ref: './schemas/admin.yaml#/CreateUserRequest'
    AdminCreateCaseRequest:
      $ref: './schemas/admin.yaml#/AdminCreateCaseRequest'
    CaseMember:
      $ref: './schemas/admin.yaml#/CaseMember'
    AddMemberRequest:
      $ref: './schemas/admin.yaml#/AddMemberRequest'
    UpdateMemberRoleRequest:
      $ref: './schemas/admin.yaml#/UpdateMemberRoleRequest'
