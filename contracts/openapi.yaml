openapi: 3.0.3
info:
  title: Daubert API
  version: 0.1.0
  description: Blockchain investigation tool API

servers:
  - url: http://localhost:8081

paths:
  /cases:
    $ref: './paths/cases.yaml#/~1cases'
  /cases/{id}:
    $ref: './paths/cases.yaml#/~1cases~1{id}'
  /cases/{caseId}/investigations:
    $ref: './paths/investigations.yaml#/~1cases~1{caseId}~1investigations'
  /investigations/{id}:
    $ref: './paths/investigations.yaml#/~1investigations~1{id}'
  /investigations/{investigationId}/traces:
    $ref: './paths/traces.yaml#/~1investigations~1{investigationId}~1traces'
  /traces/{id}:
    $ref: './paths/traces.yaml#/~1traces~1{id}'
  /blockchain/fetch-history:
    $ref: './paths/blockchain.yaml#/~1blockchain~1fetch-history'
  /cases/{caseId}/conversations:
    $ref: './paths/ai.yaml#/~1cases~1{caseId}~1conversations'
  /conversations/{id}/messages:
    $ref: './paths/ai.yaml#/~1conversations~1{id}~1messages'
  /conversations/{id}/chat:
    $ref: './paths/ai.yaml#/~1conversations~1{id}~1chat'

components:
  schemas:
    ErrorResponse:
      $ref: './schemas/common.yaml#/ErrorResponse'
    Case:
      $ref: './schemas/cases.yaml#/Case'
    CreateCaseRequest:
      $ref: './schemas/cases.yaml#/CreateCaseRequest'
    UpdateCaseRequest:
      $ref: './schemas/cases.yaml#/UpdateCaseRequest'
    Investigation:
      $ref: './schemas/investigations.yaml#/Investigation'
    CreateInvestigationRequest:
      $ref: './schemas/investigations.yaml#/CreateInvestigationRequest'
    UpdateInvestigationRequest:
      $ref: './schemas/investigations.yaml#/UpdateInvestigationRequest'
    Trace:
      $ref: './schemas/traces.yaml#/Trace'
    CreateTraceRequest:
      $ref: './schemas/traces.yaml#/CreateTraceRequest'
    UpdateTraceRequest:
      $ref: './schemas/traces.yaml#/UpdateTraceRequest'
    FetchHistoryRequest:
      $ref: './schemas/blockchain.yaml#/FetchHistoryRequest'
    FetchHistoryResponse:
      $ref: './schemas/blockchain.yaml#/FetchHistoryResponse'
    Conversation:
      $ref: './schemas/ai.yaml#/Conversation'
    Message:
      $ref: './schemas/ai.yaml#/Message'
    ChatRequest:
      $ref: './schemas/ai.yaml#/ChatRequest'
    ChatSseEvent:
      $ref: './schemas/ai.yaml#/ChatSseEvent'
