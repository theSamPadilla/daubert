/admin/labeled-entities:
  post:
    summary: Create a labeled entity (admin only)
    operationId: adminCreateLabeledEntity
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/labeled-entities.yaml#/CreateLabeledEntityRequest'
    responses:
      '201':
        description: Created labeled entity
        content:
          application/json:
            schema:
              $ref: '../schemas/labeled-entities.yaml#/LabeledEntity'

/admin/labeled-entities/{id}:
  patch:
    summary: Update a labeled entity (admin only)
    operationId: adminUpdateLabeledEntity
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/labeled-entities.yaml#/UpdateLabeledEntityRequest'
    responses:
      '200':
        description: Updated labeled entity
        content:
          application/json:
            schema:
              $ref: '../schemas/labeled-entities.yaml#/LabeledEntity'
  delete:
    summary: Delete a labeled entity (admin only)
    operationId: adminDeleteLabeledEntity
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Deleted
